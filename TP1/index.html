<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Atrapa la Snitch — Chaos Edition</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
}

body{
    overflow:hidden;
    cursor:none;
    font-family:Arial, Helvetica, sans-serif;

    background:
        radial-gradient(circle at top,
        #1d2748 0%,
        #0b1020 45%,
        #05070d 100%);
}

/* =========================
   GAME
========================= */

#game{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;
}

/* =========================
   STARS
========================= */

.star{
    position:absolute;
    background:white;
    border-radius:50%;
    opacity:.7;
}

/* =========================
   SCOREBOARD
========================= */

#scoreboard{
    position:fixed;
    top:20px;
    left:20px;

    z-index:99999;

    padding:12px 18px;

    border-radius:14px;

    background:rgba(0,0,0,.35);

    border:1px solid rgba(255,255,255,.1);

    backdrop-filter:blur(4px);

    color:#ffe680;

    font-size:22px;
    font-weight:bold;

    box-shadow:
        0 0 18px rgba(255,215,0,.15);

    transition:all .35s ease;
}

/* =========================
   MESSAGE
========================= */

#message{
    position:fixed;
    bottom:20px;
    width:100%;

    text-align:center;

    color:rgba(255,255,255,.55);

    font-size:14px;

    letter-spacing:2px;
}

/* =========================
   SNITCH
========================= */

.snitch{
    position:absolute;

    width:82px;
    height:82px;

    z-index:50;

    cursor:pointer;

    filter:
        drop-shadow(0 0 12px rgba(255,215,0,.8))
        drop-shadow(0 0 30px rgba(255,215,0,.35));

    transition:transform .06s linear;
}

.snitch:hover{
    transform:scale(1.08);
}

/* =========================
   MAGIC CURSOR
========================= */

#magicCursor{
    position:fixed;

    width:70px;
    height:70px;

    pointer-events:none;

    z-index:999999;

    transform:translate(-50%, -50%);
}

.wand{
    position:absolute;

    width:52px;
    height:6px;

    top:32px;
    left:10px;

    border-radius:10px;

    transform:rotate(-35deg);

    background:
        linear-gradient(
            90deg,
            #2f1b10,
            #70411f,
            #2a170c
        );

    box-shadow:
        0 0 8px rgba(255,190,90,.35);
}

.wand::after{
    content:"";

    position:absolute;

    right:-2px;
    top:-3px;

    width:12px;
    height:12px;

    border-radius:50%;

    background:
        radial-gradient(circle,
        #fff8cc 0%,
        #ffe066 35%,
        rgba(255,215,0,.2) 70%,
        transparent 100%);

    box-shadow:
        0 0 12px gold,
        0 0 24px rgba(255,215,0,.6);
}

.spark::before,
.spark::after{
    content:"✦";

    position:absolute;

    color:#ffe680;

    font-size:18px;

    animation:sparkle .8s infinite alternate;
}

.spark::before{
    top:8px;
    left:8px;
}

.spark::after{
    bottom:10px;
    right:10px;
    animation-delay:.4s;
}

@keyframes sparkle{

    from{
        transform:scale(.7) rotate(0deg);
        opacity:.4;
    }

    to{
        transform:scale(1.3) rotate(20deg);
        opacity:1;
    }
}

/* =========================
   TRAIL
========================= */

.trail{
    position:fixed;

    width:8px;
    height:8px;

    border-radius:50%;

    pointer-events:none;

    z-index:99999;

    background:
        radial-gradient(circle,
        #fff5a8 0%,
        gold 70%,
        transparent 100%);

    animation:fadeTrail .7s linear forwards;
}

@keyframes fadeTrail{

    from{
        opacity:1;
        transform:scale(1);
    }

    to{
        opacity:0;
        transform:scale(.2);
    }
}

/* =========================
   SCREEN SHAKE
========================= */

.shake{
    animation:shake .3s linear;
}

@keyframes shake{

    0%{ transform:translate(0,0); }
    20%{ transform:translate(-5px,2px); }
    40%{ transform:translate(5px,-2px); }
    60%{ transform:translate(-3px,3px); }
    80%{ transform:translate(3px,-3px); }
    100%{ transform:translate(0,0); }
}

</style>
</head>

<body>

<div id="game">

    <div id="scoreboard">
        Puntos: 0
    </div>

    <div id="magicCursor">
        <div class="wand"></div>
        <div class="spark"></div>
    </div>

    <div id="snitch" class="snitch">

        <svg viewBox="0 0 200 200">

            <!-- alas -->

            <g opacity="0.95">

                <path d="
                    M45 100
                    Q-10 40 30 20
                    Q10 60 45 100Z"
                    fill="#d9e6ff"
                    stroke="#ffffff"
                    stroke-width="4"/>

                <path d="
                    M155 100
                    Q210 40 170 20
                    Q190 60 155 100Z"
                    fill="#d9e6ff"
                    stroke="#ffffff"
                    stroke-width="4"/>

            </g>

            <!-- cuerpo -->

            <circle
                cx="100"
                cy="100"
                r="42"
                fill="#FFD700"
                stroke="#ffef99"
                stroke-width="8"/>

            <!-- brillo -->

            <circle
                cx="85"
                cy="82"
                r="10"
                fill="rgba(255,255,255,.7)"/>

        </svg>

    </div>

    <div id="message">
        ATRAPA LA SNITCH · CHAOS EDITION
    </div>

</div>

<script>

(() => {

    const game = document.getElementById("game");
    const snitch = document.getElementById("snitch");
    const scoreboard = document.getElementById("scoreboard");
    const magicCursor = document.getElementById("magicCursor");

    let score = 0;
    let misses = 0;

    let mouseX = innerWidth / 2;
    let mouseY = innerHeight / 2;

    let x = Math.random() * (innerWidth - 100);
    let y = Math.random() * (innerHeight - 100);

    let vx = 4;
    let vy = 4;

    const panicMultiplier = 3.8;

    /* =========================
       AUDIO
    ========================= */

    const audioCtx =
        new (window.AudioContext ||
        window.webkitAudioContext)();

    let audioStarted = false;

    let windFilter;
    let crowdGain;

    function initAudio(){

        if(audioStarted) return;

        audioStarted = true;

        createWind();
        createCrowd();
    }

    /* =========================
       WIND
    ========================= */

    function createWind(){

        const bufferSize =
            2 * audioCtx.sampleRate;

        const noiseBuffer =
            audioCtx.createBuffer(
                1,
                bufferSize,
                audioCtx.sampleRate
            );

        const output =
            noiseBuffer.getChannelData(0);

        for(let i=0;i<bufferSize;i++){

            output[i] =
                Math.random() * 2 - 1;
        }

        const whiteNoise =
            audioCtx.createBufferSource();

        whiteNoise.buffer = noiseBuffer;
        whiteNoise.loop = true;

        windFilter =
            audioCtx.createBiquadFilter();

        windFilter.type = "bandpass";
        windFilter.frequency.value = 450;

        const gain =
            audioCtx.createGain();

        gain.gain.value = 0.08;

        whiteNoise.connect(windFilter);
        windFilter.connect(gain);
        gain.connect(audioCtx.destination);

        whiteNoise.start();

        setInterval(() => {

            windFilter.frequency.value =
                300 + Math.random() * 600;

        }, 400);
    }

    /* =========================
       CROWD
    ========================= */

    function createCrowd(){

        const osc =
            audioCtx.createOscillator();

        osc.type = "sawtooth";
        osc.frequency.value = 70;

        const filter =
            audioCtx.createBiquadFilter();

        filter.type = "lowpass";
        filter.frequency.value = 500;

        crowdGain =
            audioCtx.createGain();

        crowdGain.gain.value = 0.02;

        osc.connect(filter);
        filter.connect(crowdGain);
        crowdGain.connect(audioCtx.destination);

        osc.start();

        setInterval(() => {

            crowdGain.gain.linearRampToValueAtTime(
                0.02 + Math.random() * 0.03,
                audioCtx.currentTime + 1
            );

        }, 2000);
    }

    /* =========================
       MAGIC BLIP
    ========================= */

    function magicBlip(){

        const osc =
            audioCtx.createOscillator();

        const gain =
            audioCtx.createGain();

        osc.type = "triangle";

        osc.frequency.setValueAtTime(
            1200,
            audioCtx.currentTime
        );

        osc.frequency.exponentialRampToValueAtTime(
            300,
            audioCtx.currentTime + 0.2
        );

        gain.gain.setValueAtTime(
            0.1,
            audioCtx.currentTime
        );

        gain.gain.exponentialRampToValueAtTime(
            0.0001,
            audioCtx.currentTime + 0.2
        );

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
    }

    /* =========================
       STARS
    ========================= */

    for(let i=0;i<140;i++){

        const star =
            document.createElement("div");

        star.className = "star";

        const size = Math.random() * 3;

        star.style.width = size + "px";
        star.style.height = size + "px";

        star.style.left =
            Math.random() * innerWidth + "px";

        star.style.top =
            Math.random() * innerHeight + "px";

        star.style.opacity = Math.random();

        game.appendChild(star);
    }

    /* =========================
       SCORE
    ========================= */

    function updateScore(){

        scoreboard.textContent =
            "Puntos: " + score;
    }

    function randomizeScoreboard(){

        scoreboard.style.left =
            Math.random() * (innerWidth - 200) + "px";

        scoreboard.style.top =
            Math.random() * (innerHeight - 80) + "px";
    }

    /* =========================
       AUDIO INIT
    ========================= */

    window.addEventListener("click", () => {

        audioCtx.resume();

        initAudio();

    }, { once:true });

    /* =========================
       CURSOR
    ========================= */

    window.addEventListener("mousemove", e => {

        mouseX = e.clientX;
        mouseY = e.clientY;

        magicCursor.style.left =
            mouseX + "px";

        magicCursor.style.top =
            mouseY + "px";

        /* trail */

        const t =
            document.createElement("div");

        t.className = "trail";

        t.style.left = mouseX + "px";
        t.style.top = mouseY + "px";

        document.body.appendChild(t);

        setTimeout(() => t.remove(), 700);
    });

    /* =========================
       CLICK SNITCH
    ========================= */

    snitch.addEventListener("click", e => {

        e.stopPropagation();

        score++;

        updateScore();

        magicBlip();

        vx *= -1.25;
        vy *= -1.25;

        x += (Math.random() - .5) * 120;
        y += (Math.random() - .5) * 120;

        if(Math.random() < .30){

            randomizeScoreboard();
        }

        if(Math.random() < .15 && score > 0){

            score--;

            updateScore();
        }
    });

    /* =========================
       MISSES
    ========================= */

    window.addEventListener("click", () => {

        misses++;

        if(misses % 3 === 0){

            document.body.classList.add("shake");

            setTimeout(() => {

                document.body.classList.remove("shake");

            }, 300);
        }
    });

    /* =========================
       EVIL SCORE
    ========================= */

    setInterval(() => {

        if(Math.random() < .45){

            randomizeScoreboard();
        }

        if(Math.random() < .20 && score > 0){

            score--;

            updateScore();
        }

    }, 4000);

    /* =========================
       LOOP
    ========================= */

    function loop(){

        const cx = x + 40;
        const cy = y + 40;

        const dx = cx - mouseX;
        const dy = cy - mouseY;

        const distance =
            Math.sqrt(dx * dx + dy * dy);

        const panic =
            Math.max(0, 1 - distance / 250);

        let boost = 1;

        if(distance < 250){

            boost =
                panicMultiplier -
                (distance / 250) * 2;
        }

        /* audio reactivo */

        if(windFilter){

            windFilter.frequency.value =
                400 + panic * 1800;
        }

        if(crowdGain){

            crowdGain.gain.value =
                0.02 + panic * 0.05;
        }

        x += vx * boost;
        y += vy * boost;

        /* rebotes */

        if(x <= 0 || x >= innerWidth - 82){

            vx *= -1;

            vx +=
                (Math.random() - .5) * .6;
        }

        if(y <= 0 || y >= innerHeight - 82){

            vy *= -1;

            vy +=
                (Math.random() - .5) * .6;
        }

        vx = Math.max(Math.min(vx, 10), -10);
        vy = Math.max(Math.min(vy, 10), -10);

        snitch.style.transform = `
            translate(${x}px, ${y}px)
            rotate(${performance.now() * .15}deg)
        `;

        requestAnimationFrame(loop);
    }

    updateScore();

    loop();

})();

</script>

</body>
</html>
